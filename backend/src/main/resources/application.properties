server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/image_gallery?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Admin@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.jwt.secret=${JWT_SECRET:ChangeThisSecretKeyForProduction123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
