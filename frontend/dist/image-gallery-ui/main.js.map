export default "<div class=\"row justify-content-center\"><div class=\"col-md-5\"><div class=\"card p-4\"><h3>Register</h3><input class=\"form-control my-2\" placeholder=\"Username\" [(ngModel)]=\"username\"><input class=\"form-control my-2\" placeholder=\"Email\" [(ngModel)]=\"email\"><input class=\"form-control my-2\" type=\"password\" placeholder=\"Password\" [(ngModel)]=\"password\"><button class=\"btn btn-success btn-block\" (click)=\"register()\">Create Account</button><p class=\"text-danger mt-2\">{{err}}</p></div></div></div>\n"
