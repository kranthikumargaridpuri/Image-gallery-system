export default "<div class=\"container mt-5\" style=\"max-width: 450px;\">\n  <h3>Reset Password</h3>\n\n  <input\n    class=\"form-control my-3\"\n    type=\"text\"\n    placeholder=\"Enter reset token\"\n    [(ngModel)]=\"token\"\n  />\n\n  <input\n    class=\"form-control my-3\"\n    type=\"password\"\n    placeholder=\"Enter new password\"\n    [(ngModel)]=\"newPassword\"\n  />\n\n  <button class=\"btn btn-success w-100\" (click)=\"submit()\">\n    Reset Password\n  </button>\n\n  <div class=\"text-danger mt-3\" *ngIf=\"message\">\n    {{ message }}\n  </div>\n\n  <a routerLink=\"/login\">Back to Login</a>\n</div>"
