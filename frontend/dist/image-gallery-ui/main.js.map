export default "<div class=\"container mt-5\" style=\"max-width: 450px;\">\n  <h3>Forgot Password</h3>\n\n  <input\n    class=\"form-control my-3\"\n    type=\"email\"\n    placeholder=\"Enter your email\"\n    [(ngModel)]=\"email\"\n  />\n\n  <button class=\"btn btn-primary w-100\" (click)=\"submit()\">\n    Get Reset Token\n  </button>\n\n  <div class=\"text-danger mt-3\" *ngIf=\"message\">\n    {{ message }}\n  </div>\n\n  <div class=\"alert alert-info mt-3\" *ngIf=\"token\">\n    Your reset token: <b>{{ token }}</b>\n  </div>\n\n  <a routerLink=\"/reset-password\">Go to Reset Password</a>\n</div>"
