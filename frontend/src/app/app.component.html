<div class="site-wrapper">

  <header class="premium-header">

    <div class="header-main">
      <a class="brand" routerLink="/">
        <img src="assets/images/logo.png" class="top-logo" />

        <span class="brand-text">
          <span>GLOBAL</span>
          <span>TRADERS</span>
        </span>
      </a>

      <nav class="menu">
        <a routerLink="/">GALLERY</a>
        <a routerLink="/cart" *ngIf="auth.loggedIn()">CART</a>
        <a routerLink="/admin" *ngIf="auth.isAdmin()">ADMIN</a>
        <a routerLink="/login" *ngIf="!auth.loggedIn()">LOGIN</a>
        <a routerLink="/register" *ngIf="!auth.loggedIn()">REGISTER</a>
        <a href="#" *ngIf="auth.loggedIn()" (click)="auth.logout()">LOGOUT</a>
      </nav>
    </div>

  </header>

  <main class="main-body">
    <router-outlet></router-outlet>
  </main>

</div>
